<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICAS 練習測試 | ICAS Practice Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .header p { font-size: 1.1rem; opacity: 0.9; }
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .subject-card { background: white; border-radius: 16px; padding: 30px; text-align: center; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .subject-card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
        .subject-icon { font-size: 3rem; margin-bottom: 15px; }
        .subject-name { font-size: 1.3rem; font-weight: bold; color: #333; margin-bottom: 8px; }
        .subject-desc { color: #666; font-size: 0.9rem; }
        .quiz-container { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: none; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; flex-wrap: wrap; gap: 10px; }
        .quiz-title { font-size: 1.5rem; color: #333; }
        .quiz-stats { display: flex; gap: 20px; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 0.8rem; color: #888; }
        .timer { background: #ff6b6b; color: white; padding: 8px 16px; border-radius: 20px; font-weight: bold; }
        .progress-bar { background: #e9ecef; height: 8px; border-radius: 4px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; border-radius: 4px; transition: width 0.3s; }
        .question-container { margin-bottom: 25px; }
        .question-number { color: #667eea; font-weight: bold; margin-bottom: 10px; }
        .question-text { font-size: 1.2rem; color: #333; margin-bottom: 20px; line-height: 1.6; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { background: #f8f9fa; border: 2px solid #e9ecef; border-radius: 12px; padding: 15px 20px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 12px; }
        .option:hover { background: #e9ecef; border-color: #667eea; }
        .option.selected { background: #667eea; border-color: #667eea; color: white; }
        .option.correct { background: #51cf66; border-color: #51cf66; color: white; }
        .option.wrong { background: #ff6b6b; border-color: #ff6b6b; color: white; }
        .option-letter { width: 32px; height: 32px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #667eea; flex-shrink: 0; }
        .option.selected .option-letter, .option.correct .option-letter, .option.wrong .option-letter { color: inherit; background: rgba(255,255,255,0.3); }
        .explanation { background: #fff9e6; border-left: 4px solid #ffc107; border-radius: 8px; padding: 20px; margin-top: 20px; display: none; }
        .explanation.show { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .explanation-title { font-weight: bold; color: #856404; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .explanation-text { color: #856404; line-height: 1.6; }
        .correct-answer { color: #51cf66; font-weight: bold; }
        .your-answer { color: #ff6b6b; font-weight: bold; }
        .btn { background: #667eea; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 1rem; cursor: pointer; transition: all 0.3s; font-weight: bold; }
        .btn:hover { background: #5a6fd6; transform: translateY(-2px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-container { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .results-container { background: white; border-radius: 20px; padding: 40px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: none; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; color: white; font-size: 2.5rem; font-weight: bold; }
        .results-title { font-size: 2rem; color: #333; margin-bottom: 15px; }
        .results-message { color: #666; font-size: 1.1rem; margin-bottom: 30px; }
        .results-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .result-stat { background: #f8f9fa; border-radius: 12px; padding: 20px; }
        .result-stat-value { font-size: 2rem; font-weight: bold; color: #667eea; }
        .result-stat-label { color: #888; font-size: 0.9rem; }
        .back-btn { background: none; border: 2px solid #667eea; color: #667eea; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; margin-bottom: 20px; }
        .back-btn:hover { background: #667eea; color: white; }
        .difficulty-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; margin-left: 10px; }
        .difficulty-easy { background: #d4edda; color: #155724; }
        .difficulty-medium { background: #fff3cd; color: #856404; }
        .difficulty-hard { background: #f8d7da; color: #721c24; }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .quiz-header { flex-direction: column; gap: 15px; align-items: flex-start; }
            .results-stats { grid-template-columns: 1fr; }
            .question-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 ICAS 練習測試</h1>
            <p>選擇科目開始練習，答錯會有詳細解釋 | 每科100題隨機抽選20題</p>
        </div>

        <div id="subjectSelection" class="subject-grid">
            <div class="subject-card" onclick="startQuiz('math')">
                <div class="subject-icon">🔢</div>
                <div class="subject-name">數學 Mathematics</div>
                <div class="subject-desc">100題涵蓋算術、代數、幾何、數據、邏輯</div>
            </div>
            <div class="subject-card" onclick="startQuiz('english')">
                <div class="subject-icon">📚</div>
                <div class="subject-name">英文 English</div>
                <div class="subject-desc">100題涵蓋拼寫、文法、詞彙、閱讀理解</div>
            </div>
            <div class="subject-card" onclick="startQuiz('science')">
                <div class="subject-icon">🔬</div>
                <div class="subject-name">科學 Science</div>
                <div class="subject-desc">100題涵蓋物理、化學、生物、地球科學</div>
            </div>
        </div>

        <div id="quizContainer" class="quiz-container">
            <button class="back-btn" onclick="goBack()">← 返回選單</button>
            
            <div class="quiz-header">
                <div class="quiz-title" id="quizTitle">數學測試</div>
                <div class="quiz-stats">
                    <div class="stat">
                        <div class="stat-value" id="questionNum">1</div>
                        <div class="stat-label">題目</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="scoreDisplay">0</div>
                        <div class="stat-label">分數</div>
                    </div>
                    <div class="timer" id="timer">30:00</div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%"></div>
            </div>

            <div class="question-container">
                <div class="question-number">
                    題目 <span id="currentQ">1</span> / <span id="totalQ">20</span>
                    <span id="difficultyBadge" class="difficulty-badge difficulty-medium">中等</span>
                </div>
                <div class="question-text" id="questionText">Loading...</div>
                
                <div class="options" id="optionsContainer"></div>

                <div class="explanation" id="explanation">
                    <div class="explanation-title">💡 解釋 Explanation</div>
                    <div class="explanation-text" id="explanationText"></div>
                </div>
            </div>

            <div class="btn-container">
                <button class="btn" id="submitBtn" onclick="submitAnswer()">提交答案</button>
                <button class="btn btn-secondary" id="nextBtn" onclick="nextQuestion()" style="display:none">下一題 →</button>
            </div>
        </div>

        <div id="resultsContainer" class="results-container">
            <div class="score-circle" id="finalScore">0%</div>
            <h2 class="results-title">測試完成！</h2>
            <p class="results-message" id="resultsMessage">做得好！繼續努力！</p>
            
            <div class="results-stats">
                <div class="result-stat">
                    <div class="result-stat-value" id="correctCount">0</div>
                    <div class="result-stat-label">答對</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" id="wrongCount">0</div>
                    <div class="result-stat-label">答錯</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" id="timeUsed">0:00</div>
                    <div class="result-stat-label">用時</div>
                </div>
            </div>

            <button class="btn" onclick="restartQuiz()">再試一次（新題目）</button>
        </div>
    </div>

    <script src="all_questions.js?v=2"></script>
    
    <script>
        // ==========================================
        // ICAS Practice Test - Main Logic (100 Questions Version)
        // ==========================================
        
        let currentSubject = '';
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOption = -1;
        let answered = false;
        let timerInterval;
        let timeRemaining = 1800;
        let startTime;
        const QUESTIONS_PER_QUIZ = 20;

        const subjectConfig = {
            math: { name: '數學 Mathematics', icon: '🔢', time: 1800 },
            english: { name: '英文 English', icon: '📚', time: 1800 },
            science: { name: '科學 Science', icon: '🔬', time: 1800 }
        };

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getQuestionsForSubject(subject) {
            let allQuestions;
            switch(subject) {
                case 'math': allQuestions = mathQuestions; break;
                case 'english': allQuestions = englishQuestions; break;
                case 'science': allQuestions = scienceQuestions; break;
                default: return [];
            }
            const shuffled = shuffleArray(allQuestions);
            return shuffled.slice(0, QUESTIONS_PER_QUIZ);
        }

        function startQuiz(subject) {
            currentSubject = subject;
            currentQuestions = getQuestionsForSubject(subject);
            currentQuestionIndex = 0;
            score = 0;
            timeRemaining = subjectConfig[subject].time;
            startTime = Date.now();

            document.getElementById('subjectSelection').style.display = 'none';
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('resultsContainer').style.display = 'none';

            document.getElementById('quizTitle').textContent = subjectConfig[subject].name;
            document.getElementById('totalQ').textContent = QUESTIONS_PER_QUIZ;

            startTimer();
            displayQuestion();
        }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                if (timeRemaining <= 0) endQuiz();
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            document.getElementById('timer').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('timer').style.background = timeRemaining < 60 ? '#ff4757' : timeRemaining < 300 ? '#ffa502' : '#ff6b6b';
        }

        function getDifficultyLabel(d) {
            return { easy: '簡單', medium: '中等', hard: '困難' }[d] || '中等';
        }

        function displayQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            answered = false;
            selectedOption = -1;

            document.getElementById('currentQ').textContent = currentQuestionIndex + 1;
            document.getElementById('questionNum').textContent = currentQuestionIndex + 1;
            document.getElementById('questionText').textContent = q.q;
            document.getElementById('scoreDisplay').textContent = score;

            const badge = document.getElementById('difficultyBadge');
            badge.textContent = getDifficultyLabel(q.d);
            badge.className = `difficulty-badge difficulty-${q.d}`;

            document.getElementById('progressBar').style.width = `${((currentQuestionIndex + 1) / QUESTIONS_PER_QUIZ) * 100}%`;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            document.getElementById('explanation').classList.remove('show');

            q.o.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + index)}</div><div>${option}</div>`;
                optionDiv.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionDiv);
            });

            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('nextBtn').style.display = 'none';
        }

        function selectOption(index) {
            if (answered) return;
            selectedOption = index;
            document.querySelectorAll('.option').forEach((opt, i) => opt.classList.toggle('selected', i === index));
        }

        function submitAnswer() {
            if (selectedOption === -1) { alert('請選擇一個答案！Please select an answer!'); return; }

            answered = true;
            const q = currentQuestions[currentQuestionIndex];
            const options = document.querySelectorAll('.option');

            options.forEach((opt, i) => {
                opt.classList.remove('selected');
                if (i === q.a) opt.classList.add('correct');
                else if (i === selectedOption && i !== q.a) opt.classList.add('wrong');
            });

            if (selectedOption === q.a) score++;
            document.getElementById('scoreDisplay').textContent = score;

            const explanationDiv = document.getElementById('explanation');
            const explanationText = document.getElementById('explanationText');
            
            let explanationHTML = selectedOption !== q.a 
                ? `<div class="your-answer">你的答案：${q.o[selectedOption]}</div><div class="correct-answer">✅ 正確答案：${q.o[q.a]}</div><br>`
                : `<div class="correct-answer">✅ 答對了！Correct!</div><br>`;
            explanationHTML += q.e.replace(/\n/g, '<br>');
            
            explanationText.innerHTML = explanationHTML;
            explanationDiv.classList.add('show');

            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
            if (currentQuestionIndex === QUESTIONS_PER_QUIZ - 1) document.getElementById('nextBtn').textContent = '查看結果 →';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < QUESTIONS_PER_QUIZ) {
                document.getElementById('nextBtn').textContent = '下一題 →';
                displayQuestion();
            } else endQuiz();
        }

        function endQuiz() {
            clearInterval(timerInterval);
            const timeUsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(timeUsed / 60);
            const seconds = timeUsed % 60;

            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('resultsContainer').style.display = 'block';

            const percentage = Math.round((score / QUESTIONS_PER_QUIZ) * 100);
            document.getElementById('finalScore').textContent = percentage + '%';
            document.getElementById('correctCount').textContent = score;
            document.getElementById('wrongCount').textContent = QUESTIONS_PER_QUIZ - score;
            document.getElementById('timeUsed').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;

            let message = percentage >= 80 ? '太棒了！Excellent work! 🎉 你掌握得很好！' :
                          percentage >= 60 ? '做得好！Good job! 👍 繼續練習，你會越來越好！' :
                          percentage >= 40 ? '繼續加油！Keep practicing! 💪 多看看解釋，理解題目！' :
                          '不要氣餒！Don\'t give up! 📚 重新練習，慢慢進步！';
            document.getElementById('resultsMessage').textContent = message;
        }

        function restartQuiz() { startQuiz(currentSubject); }
        function goBack() {
            clearInterval(timerInterval);
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('resultsContainer').style.display = 'none';
            document.getElementById('subjectSelection').style.display = 'grid';
            document.getElementById('timer').style.background = '#ff6b6b';
        }
    </script>
</body>
</html>
